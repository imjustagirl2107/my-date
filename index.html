<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Will you go on a date with me?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
  </div>

  <main class="card" id="card">

    <div class="dots" id="dots" aria-hidden="true">
      <span class="dot active" data-dot="0"></span>
      <span class="dot" data-dot="1"></span>
      <span class="dot" data-dot="2"></span>
      <span class="dot" data-dot="3"></span>
    </div>

    <section class="screen active" data-screen="0">
      <p class="eyebrow">A little question</p>
      <h1>Will you go on a date with me? 🌸</h1>

      <div class="actions">
        <button id="yesBtn" class="btn btn-yes">Yes ❤️</button>
        <button id="noBtn" class="btn btn-no">No 😢</button>
      </div>
    </section>

    <section class="screen" data-screen="1">
      <p class="eyebrow">Step one</p>
      <h1>Where would you like to go? 📍</h1>

      <div class="form">
        <label class="field">
          <select id="placeSelect" class="input">
            <option value="A restaurant">🍝 A restaurant</option>
            <option value="The movies">🎬 The movies</option>
            <option value="A café">☕ A café</option>
            <option value="Outdoors / a walk">🌳 Outdoors / a walk</option>
            <option value="__other__">✏️ Something else</option>
          </select>
        </label>

        <label class="field" id="otherPlaceField" hidden>
          <input type="text" id="otherPlaceInput" class="input" placeholder="Tell me where">
        </label>
      </div>

      <button class="btn btn-yes btn-continue" data-next>Next ❤️</button>
    </section>

    <section class="screen" data-screen="2">
      <p class="eyebrow">Step two</p>
      <h1>When works for you? 📅</h1>

      <div class="form">
        <label class="field">
          <span class="field-label">Date</span>
          <input type="date" id="dateInput" class="input" required>
        </label>

        <label class="field">
          <span class="field-label">Time</span>
          <input type="time" id="timeInput" class="input" required>
        </label>
      </div>

      <button class="btn btn-yes btn-continue" id="confirmBtn">Confirm ❤️</button>
    </section>

    <section class="screen" data-screen="3">
      <p class="eyebrow">All set</p>
      <h1>Yay! ❤️ I can't wait!</h1>
      <p class="reveal-value reveal-value--sub" id="successDetails">—</p>
    </section>

  </main>

  <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
